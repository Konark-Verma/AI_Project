<!DOCTYPE html>
<html>

<head>

<title>AI Travel Plan</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<header class="result-header">
<h1>Your AI Travel Plan</h1>
</header>

<div class="result-layout">

<div class="info-panel">

<div id="results"></div>

<div class="chat-widget card">
    <h3>Need help with this trip?</h3>
    <div id="chat-body" class="chat-body"></div>
    <form id="chat-form" class="chat-form">
        <input id="chat-message" type="text" placeholder="Ask about your itinerary, budget, transport, weather, or attractions...">
        <button type="submit">Send</button>
    </form>
</div>

</div>

<div class="map-panel">

<div id="map"></div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>
window.onload=function(){
loadResults()
}
</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>AI Travel Planner</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="landing-body">

<div class="hero">
    <h1 class="headline">AI Travel Planner ✈</h1>
    <p class="subhead">Plan intelligent journeys powered by AI</p>
</div>

<div class="travel-container">
    <a href="/search?type=city" class="travel-card" data-type="city">
        <div class="icon">🏙</div>
        <h2>City Travel</h2>
        <p>Discover places within the same city</p>
    </a>

    <a href="/search?type=international" class="travel-card" data-type="international">
        <div class="icon">✈</div>
        <h2>International Travel</h2>
        <p>Plan trips across countries</p>
    </a>
</div>

<footer class="landing-footer">
    <p>© 2026 AI Travel Planner. Ready to explore?</p>
</footer>

<!-- small script to add card ripple effect and background animation -->
<script>
    document.querySelectorAll('.travel-card').forEach(card => {
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', x + 'px');
            card.style.setProperty('--mouse-y', y + 'px');
        });
    });

    // Animate background gradient
    let hue = 180;
    setInterval(() => {
        hue = (hue + 0.2) % 360;
        document.body.style.background = `linear-gradient(135deg, hsl(${hue},70%,40%), hsl(${(hue+60)%360},80%,60%))`;
    }, 50);
</script>

</body>

</html>
